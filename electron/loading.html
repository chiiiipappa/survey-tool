<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>SurveyTool 起動中...</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1c2230;
    color: #f5f5f5;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  .box { text-align: center; }
  .spinner {
    width: 36px;
    height: 36px;
    margin: 0 auto 20px;
    border: 4px solid #3a4256;
    border-top-color: #6ea8fe;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status { font-size: 14px; color: #c7ccd6; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <div id="status">SurveyTool を起動しています...</div>
  </div>
  <script>
    window.setStatus = function (message) {
      document.getElementById("status").textContent = message;
    };
  </script>
</body>
</html>
